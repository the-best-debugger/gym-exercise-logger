<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gym Exercise Logger</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Gym Exercise Logger</h1>
    <p class="subtitle">Track sets so you never guess your last weight again.</p>

    <section class="card">
      <h2 id="form-title">Add New Log</h2>
      <form id="log-form">
        <label>
          Exercise Name
          <input type="text" id="exercise_name" placeholder="e.g. Bench Press" required />
        </label>

        <label>
          Weight (kg)
          <input type="number" id="weight_kg" min="0" step="0.5" required />
        </label>

        <label>
          Reps
          <input type="number" id="reps" min="1" step="1" required />
        </label>

        <div class="buttons">
          <button type="submit" id="submit-btn">Save Log</button>
          <button type="button" id="cancel-edit" class="secondary hidden">Cancel Edit</button>
        </div>
      </form>
    </section>

    <section class="card">
      <h2>Workout History</h2>
      <p id="loading" class="info hidden">Loading logs...</p>
      <p id="error" class="error hidden"></p>
      <div id="logs-container"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
